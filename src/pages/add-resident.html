<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajouter un Résident - Chef SES</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Ajouter un Résident</h1>
      <a href="#" id="back-link">← Retour</a>
    </header>

    <main class="form-container">
      <form id="add-resident-form">
        <section class="form-section">
          <h2>Informations personnelles</h2>

          <div class="form-row">
            <div class="form-group">
              <label for="firstName">Prénom *</label>
              <input type="text" id="firstName" required>
            </div>
            <div class="form-group">
              <label for="lastName">Nom *</label>
              <input type="text" id="lastName" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="dateOfBirth">Date de naissance *</label>
              <input type="date" id="dateOfBirth" required>
            </div>
            <div class="form-group">
              <label for="gender">Genre *</label>
              <select id="gender" required>
                <option value="">Sélectionner...</option>
                <option value="homme">Homme</option>
                <option value="femme">Femme</option>
                <option value="autre">Autre</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="roomNumber">Numéro de chambre</label>
              <input type="text" id="roomNumber">
            </div>
            <div class="form-group">
              <label for="phone">Téléphone</label>
              <input type="tel" id="phone">
            </div>
          </div>
        </section>

        <section class="form-section">
          <h2>Profil nutritionnel</h2>

          <div class="form-group">
            <label>Allergies</label>
            <div id="allergies-container">
              <button type="button" class="btn btn-sm" onclick="addAllergy()">+ Ajouter une allergie</button>
            </div>
          </div>

          <div class="form-group">
            <label>Restrictions alimentaires</label>
            <div id="restrictions-container">
              <button type="button" class="btn btn-sm" onclick="addRestriction()">+ Ajouter une restriction</button>
            </div>
          </div>
        </section>

        <div id="error-message" class="error-message" style="display: none;"></div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancel-btn">Annuler</button>
          <button type="submit" class="btn btn-primary">Enregistrer</button>
        </div>
      </form>
    </main>
  </div>

  <script type="module" src="/pages/add-resident.js"></script>
</body>
</html>
