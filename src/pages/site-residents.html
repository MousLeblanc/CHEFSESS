<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion des Résidents - Chef SES</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>🍽️ Chef SES</h2>
        <p id="site-name"></p>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-link" id="dashboard-link">
          📊 Tableau de bord
        </a>
        <a href="#" class="nav-link active">
          👥 Résidents
        </a>
        <a href="#" class="nav-link" id="menus-link">
          📋 Menus
        </a>
        <a href="#" class="nav-link logout-link">
          🚪 Déconnexion
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="dashboard-header">
        <h1>Gestion des Résidents</h1>
        <div class="header-actions">
          <a href="/pages/add-resident.html" class="btn btn-primary" id="add-resident-btn">+ Ajouter un résident</a>
        </div>
      </header>

      <div class="dashboard-content">
        <div class="filters">
          <input type="text" id="search-input" placeholder="Rechercher un résident...">
          <select id="status-filter">
            <option value="actif">Actifs</option>
            <option value="inactif">Inactifs</option>
            <option value="all">Tous</option>
          </select>
        </div>

        <div id="residents-list"></div>
      </div>
    </main>
  </div>

  <script type="module" src="/pages/site-residents.js"></script>
</body>
</html>
